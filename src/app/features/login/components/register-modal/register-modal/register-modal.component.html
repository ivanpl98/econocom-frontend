<div class="register-modal">
    <h2 mat-dialog-title class="register-modal__title">Registro de Usuario</h2>
    <mat-dialog-content class="register-modal__content">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" class="register-modal__field">
                <mat-label>Correo electrónico</mat-label>
                <input matInput type="email" formControlName="email" required />
                <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
                    El correo electrónico es obligatorio.
                </mat-error>
                <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
                    Por favor, ingresa un correo electrónico válido.
                </mat-error>
            </mat-form-field>
            <mat-form-field appearance="outline" class="register-modal__field">
                <mat-label>Contraseña</mat-label>
                <input matInput type="password" formControlName="password" required />
                <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
                    La contraseña es obligatoria.
                </mat-error>
                <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
                    La contraseña debe tener al menos 6 caracteres.
                </mat-error>
            </mat-form-field>
        </form>
    </mat-dialog-content>
    <mat-dialog-actions align="end" class="register-modal__actions">
        <button mat-button (click)="onCancel()">Cancelar</button>
        <button mat-flat-button color="primary" type="submit" (click)="onSubmit()" [disabled]="registerForm.invalid">
            {{'Registrarse' | uppercase}}
        </button>
    </mat-dialog-actions>
</div>
